<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도서 목록</title>
    <style>
        body { font-family: sans-serif; margin: 24px; }
        table { border-collapse: collapse; width: 100%; max-width: 720px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
        .empty { margin-top: 12px; color: #666; }
    </style>
</head>
<body>
<h1>Book Table</h1>

<form action="/book" method="get" style="margin-bottom: 16px;">
    <label for="id">검색할 책 ID:</label>
    <input id="id" name="id" type="number" min="1" th:value="${searchId}" required>
    <button type="submit">검색</button>
    <a href="/books" style="margin-left: 8px;">전체 목록</a>
</form>

<div class="empty" th:if="${message != null}" th:text="${message}"></div>

<table th:if="${books != null and !#lists.isEmpty(books)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Author</th>
        <th>Price</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.name}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.price}"></td>
    </tr>
    </tbody>
</table>

<div class="empty" th:if="${books == null or #lists.isEmpty(books)}">조회된 데이터가 없습니다.</div>

검색 도서명: <span th:text="${bookName}"></span> <br>
</body>
</html>
